<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — KinoWeb</title>
    <link rel="stylesheet" href="styles_new.css">
</head>
<body>
    <header>
        <div class="navbar">
            <a href="home.html" class="logo">KinoWeb</a>
            <nav class="menu">
                <a href="home.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="search.html">Поиск</a>
                <a href="favorites.html">Избранное</a>
                <a href="profile.html">Профиль</a>
                <a href="admin.html">Админ</a>
                <a href="auth.html">Войти</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="section" style="width: fit-content; margin: 100px auto; padding: 30px 50px; display: flex; flex-direction: column; align-items: center;">
            <h2>Регистрация</h2>
            <form class="auth-form">
                <div class="form-group">
                    <label for="reg-login">Логин</label><br>
                    <input type="text" id="reg-login" placeholder="Придумайте логин">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label><br>
                    <input type="email" id="reg-email" placeholder="Введите email">
                </div>
                <div class="form-group">
                    <label for="reg-password">Пароль</label><br>
                    <input type="password" id="reg-password" placeholder="Придумайте пароль">
                </div>
                <div class="form-group">
                    <label for="reg-password2">Повторите пароль</label><br>
                    <input type="password" id="reg-password2" placeholder="Повторите пароль">
                </div>
                <button type="submit">Зарегистрироваться</button>
            </form>
        </section>
    </main>
</body>
</html>
