<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аутентификация — Онлайн Кинотеатр</title>
    <link rel="stylesheet" href="styles_new.css">
</head>

<body>
    <header>
        <div class="navbar">
            <a href="home.html" class="logo">KinoWeb</a>
            <nav class="menu">
                <a href="home.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="search.html">Поиск</a>
                <a href="favorites.html">Избранное</a>
                <a href="profile.html">Профиль</a>
                <a href="admin.html">Админ</a>
                <a href="auth.html" class="active">Войти</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="section" style="width: fit-content; margin: 100px auto; display: flex; flex-direction: column; align-items: center;">
            <h2>Аутентификация</h2>
            <form class="auth-form">
                <div class="form-group">
                    <label for="login">Логин</label><br>
                    <input type="text" id="login" placeholder="Введите логин">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label><br>
                    <input type="password" id="password" placeholder="Введите пароль">
                </div>
                <button type="submit">Войти</button>
                <button type="button" onclick="location.href=''">Забыли пароль?</button>
                <p>Ещё не зарегистрированы?</p>
                <button type="button" onclick="location.href='register.html'">Регистрация</button>
            </form>
        </section>
    </main>
</body>

</html>
